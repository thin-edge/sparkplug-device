# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: spdevice
dist: dist/

before:
  hooks:
    - go mod tidy

builds:
  - id: spdevice
    main: ./cmd/spdevice
    binary: spdevice
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - arm64
      - amd64
      - "386"
      - arm
    goarm:
      - "6"
      - "7"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm

archives:
  - ids:
      - spdevice
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

dockers_v2:
  - id: spdevice-ttyd
    ids:
      - spdevice
    dockerfile: Dockerfile.ttyd
    images:
      - "ghcr.io/thin-edge/spdevice-ttyd"
    tags:
      - "{{ .Tag }}"
      - "v{{ .Major }}"
      - "{{ if not .IsNightly }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
      - linux/arm/v6
    labels:
      "org.opencontainers.image.description": "Sparkplug B CNC device simulator with ttyd web terminal"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"

release:
  draft: false
  prerelease: auto

nfpms:
  # ── Binary-only package ────────────────────────────────────────────────────
  # Installs /usr/bin/spdevice.  No service is registered.
  - id: spdevice
    ids:
      - spdevice
    release: "1"
    maintainer: thin-edge.io <info@thin-edge.io>
    file_name_template: "{{ .ConventionalFileName }}"
    formats:
      - deb
      - apk
      - rpm
    package_name: spdevice
    description: Sparkplug B CNC device simulator (binary)

  # ── Service package ────────────────────────────────────────────────────────
  # Installs /usr/bin/spdevice, the systemd unit, and the default config.
  # Enables and starts the service on install; cleans up on removal.
  - id: spdevice-service
    ids:
      - spdevice
    release: "1"
    maintainer: thin-edge.io <info@thin-edge.io>
    file_name_template: "{{ .ConventionalFileName }}"
    formats:
      - deb
      - rpm
    package_name: spdevice-service
    description: Sparkplug B CNC device simulator (binary + systemd service)
    contents:
      - src: packaging/systemd/spdevice.service
        dst: /lib/systemd/system/spdevice.service
        file_info:
          mode: 0644
      - src: packaging/spdevice.env
        dst: /etc/spdevice/spdevice.env
        type: config|noreplace
        file_info:
          mode: 0644
    overrides:
      deb:
        scripts:
          postinstall: packaging/deb/postinst
          preremove: packaging/deb/prerm
          postremove: packaging/deb/postrm
      rpm:
        scripts:
          postinstall: packaging/rpm/post
          preremove: packaging/rpm/preun
          postremove: packaging/rpm/postun
